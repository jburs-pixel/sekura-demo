<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sekura — Monitoreo de garantías rurales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --surface2: #FAFBFC;
    --border: #EAECEF;
    --borderHi: #D5D9DF;
    --ink: #0A0B0D;
    --ink2: #1F2329;
    --muted: #5A6270;
    --faint: #8A93A0;
    --brand: #0F1A2E;
    --brand2: #1B2840;
    --accent: #2E5BFF;
    --accent2: #1E3FB8;
    --green: #0EA471;
    --greenBg: #E6F7EF;
    --amber: #C77400;
    --amberBg: #FFF4DC;
    --red: #D63A3A;
    --redBg: #FCE8E8;
    --violet: #6B47DC;
    --violetBg: #EFEAFB;
    --sky: #0D7FBF;
    --skyBg: #E1F2FB;
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --shadow-sm: 0 1px 2px rgba(15,26,46,0.04);
    --shadow-md: 0 1px 3px rgba(15,26,46,0.04), 0 4px 12px rgba(15,26,46,0.04);
    --sans: 'Geist', -apple-system, system-ui, 'Segoe UI', sans-serif;
    --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    letter-spacing: -0.005em;
  }
  button { font-family: inherit; }
  a { color: var(--accent); text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  /* ========== APP SHELL ========== */
  .app { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    height: 60px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 24px;
    flex-shrink: 0;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, #0F1A2E 0%, #2E4275 100%);
    border-radius: 8px;
    display: grid; place-items: center;
    color: white; font-weight: 700; font-size: 14px;
    letter-spacing: -0.02em;
  }
  .brand-name { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  .topbar .right { margin-left: auto; display: flex; align-items: center; gap: 14px; }

  .lang {
    display: flex; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; padding: 2px;
  }
  .lang button {
    padding: 4px 10px; font-size: 12px; font-weight: 500;
    background: transparent; color: var(--muted); border: none; cursor: pointer;
    border-radius: 6px;
  }
  .lang button:hover { color: var(--ink); }
  .lang button.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }

  .icon-btn {
    width: 36px; height: 36px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    display: grid; place-items: center; cursor: pointer; color: var(--muted);
    position: relative;
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--borderHi); }
  .icon-btn svg { width: 16px; height: 16px; }
  .notif-dot {
    position: absolute; top: 6px; right: 6px;
    width: 8px; height: 8px; background: var(--red);
    border-radius: 50%; border: 2px solid var(--surface);
  }

  .user-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 10px 4px 4px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; cursor: pointer;
  }
  .user-chip:hover { border-color: var(--borderHi); }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #2E5BFF, #6B47DC);
    color: white; display: grid; place-items: center;
    font-weight: 600; font-size: 12px;
  }
  .user-chip .nm { font-size: 13px; font-weight: 500; }

  /* ========== BODY ========== */
  .body { flex: 1; display: flex; min-height: 0; }
  .sidebar {
    width: 220px; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 16px 12px;
    flex-shrink: 0;
  }
  .side-grp {
    font-size: 11px; font-weight: 600; color: var(--faint);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 8px 12px 6px;
  }
  .side-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px;
    color: var(--muted); font-size: 14px; font-weight: 500;
    cursor: pointer; border: none; background: transparent; width: 100%; text-align: left;
    transition: all 120ms ease;
  }
  .side-item:hover { background: var(--surface2); color: var(--ink); }
  .side-item.active { background: var(--brand); color: white; }
  .side-item.active:hover { background: var(--brand2); }
  .side-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .side-item .ct {
    margin-left: auto; font-size: 11px; font-weight: 500;
    background: rgba(0,0,0,0.06); padding: 1px 7px; border-radius: 999px;
  }
  .side-item.active .ct { background: rgba(255,255,255,0.18); color: white; }
  .side-spacer { flex: 1; }
  .side-foot {
    padding: 10px 12px; font-size: 11px; color: var(--faint);
    border-top: 1px solid var(--border); margin-top: 8px; line-height: 1.5;
  }
  .side-foot strong { color: var(--muted); font-weight: 500; }

  .main { flex: 1; min-width: 0; overflow: auto; }
  .container { padding: 24px 28px; max-width: 1480px; }

  /* ========== HEADERS ========== */
  .page-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px; margin-bottom: 22px; flex-wrap: wrap;
  }
  .page-head h1 {
    font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 4px;
  }
  .page-head .sub { color: var(--muted); font-size: 14px; }
  .page-head .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ========== BUTTONS ========== */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 16px; font-size: 13px; font-weight: 500;
    border-radius: 8px; cursor: pointer; border: 1px solid transparent;
    transition: all 120ms ease; line-height: 1;
  }
  .btn svg { width: 14px; height: 14px; }
  .btn-primary { background: var(--brand); color: white; }
  .btn-primary:hover { background: var(--brand2); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: var(--accent2); }
  .btn-ghost {
    background: var(--surface); color: var(--ink2);
    border-color: var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); border-color: var(--borderHi); }
  .btn-link {
    background: transparent; color: var(--accent); padding: 8px 12px;
  }
  .btn-link:hover { background: rgba(46,91,255,0.06); }

  /* ========== KPI CARDS ========== */
  .kpis {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px;
  }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px;
    display: flex; flex-direction: column; gap: 12px; min-height: 120px;
  }
  .kpi .row1 { display: flex; align-items: center; justify-content: space-between; }
  .kpi .lbl { font-size: 13px; color: var(--muted); font-weight: 500; }
  .kpi .ico {
    width: 36px; height: 36px; border-radius: 8px;
    display: grid; place-items: center;
  }
  .kpi .ico svg { width: 16px; height: 16px; }
  .kpi .ico.blue { background: #EAF0FF; color: var(--accent); }
  .kpi .ico.green { background: var(--greenBg); color: var(--green); }
  .kpi .ico.amber { background: var(--amberBg); color: var(--amber); }
  .kpi .ico.red { background: var(--redBg); color: var(--red); }
  .kpi .ico.violet { background: var(--violetBg); color: var(--violet); }
  .kpi .val {
    font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
    font-feature-settings: 'tnum';
  }
  .kpi .val .unit { font-size: 14px; color: var(--muted); font-weight: 500; margin-left: 4px; }
  .kpi .delta {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 500; color: var(--muted);
  }
  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }

  /* ========== CARDS / SECTIONS ========== */
  .grid-2 {
    display: grid; grid-template-columns: 1.6fr 1fr; gap: 14px; margin-bottom: 22px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  }
  .card-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .card-head h3 {
    font-size: 15px; font-weight: 600; margin: 0; letter-spacing: -0.01em;
  }
  .card-head .sub { color: var(--muted); font-size: 13px; }
  .card-body { padding: 20px; }

  /* ========== MAP ========== */
  .map-wrap { display: grid; grid-template-columns: 1fr 220px; gap: 24px; align-items: center; }
  .legend { display: flex; flex-direction: column; gap: 4px; }
  .legend-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-radius: 8px; cursor: pointer;
    border: 1px solid transparent; transition: all 120ms;
  }
  .legend-item:hover { background: var(--surface2); }
  .legend-item.active { border-color: var(--borderHi); background: var(--surface2); }
  .legend-left { display: flex; align-items: center; gap: 10px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .legend-name { font-size: 13px; font-weight: 500; }
  .legend-pct {
    font-size: 12px; color: var(--muted);
    font-feature-settings: 'tnum'; font-variant-numeric: tabular-nums;
  }
  .legend-ct {
    font-size: 11px; color: var(--faint);
    margin-top: 1px;
  }

  /* ========== TABS / FILTER PILLS ========== */
  .pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 500;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; transition: all 120ms;
  }
  .pill:hover { color: var(--ink); border-color: var(--borderHi); }
  .pill.active {
    background: var(--brand); color: white; border-color: var(--brand);
  }
  .pill .ct {
    margin-left: 6px; padding: 1px 6px; background: rgba(0,0,0,0.06);
    border-radius: 999px; font-size: 11px;
  }
  .pill.active .ct { background: rgba(255,255,255,0.2); }

  /* ========== TABLE ========== */
  table.t { width: 100%; border-collapse: collapse; }
  table.t th {
    text-align: left; padding: 12px 18px; font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 1;
  }
  table.t td {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--ink2);
    font-feature-settings: 'tnum';
  }
  table.t tr:last-child td { border-bottom: none; }
  table.t tr.click { cursor: pointer; transition: background 120ms; }
  table.t tr.click:hover td { background: var(--surface2); }
  table.t .mono { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  table.t .strong { font-weight: 500; color: var(--ink); }
  table.t .right { text-align: right; }
  .car-cell { display: flex; flex-direction: column; gap: 2px; }
  .car-cell .a { font-family: var(--mono); font-size: 12px; color: var(--ink); font-weight: 500; }
  .car-cell .b { font-size: 11px; color: var(--faint); }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500;
  }
  .badge .bdot { width: 6px; height: 6px; border-radius: 50%; }
  .badge.ok { background: var(--greenBg); color: var(--green); }
  .badge.ok .bdot { background: var(--green); }
  .badge.watch { background: var(--amberBg); color: var(--amber); }
  .badge.watch .bdot { background: var(--amber); }
  .badge.breach { background: var(--redBg); color: var(--red); }
  .badge.breach .bdot { background: var(--red); }
  .badge.cyan { background: var(--skyBg); color: var(--sky); }
  .badge.violet { background: var(--violetBg); color: var(--violet); }

  .avatar-sm {
    width: 26px; height: 26px; border-radius: 50%;
    display: inline-grid; place-items: center;
    color: white; font-weight: 600; font-size: 11px; flex-shrink: 0;
  }
  .owner-cell { display: flex; align-items: center; gap: 10px; }
  .owner-cell .nm { font-weight: 500; color: var(--ink); }
  .owner-cell .doc { font-size: 11px; color: var(--faint); font-family: var(--mono); }

  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-top: 1px solid var(--border);
    font-size: 13px; color: var(--muted);
  }
  .pagination .controls { display: flex; gap: 6px; align-items: center; }
  .pg-btn {
    padding: 6px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--ink2);
  }
  .pg-btn:hover:not(:disabled) { border-color: var(--borderHi); background: var(--surface2); }
  .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ========== SCANNER ========== */
  .scanner-hero {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 36px; margin-bottom: 22px;
    text-align: center;
  }
  .scanner-ico {
    width: 64px; height: 64px; margin: 0 auto 16px;
    background: linear-gradient(135deg, #EAF0FF 0%, #DCE6FF 100%);
    border-radius: 16px; display: grid; place-items: center; color: var(--accent);
  }
  .scanner-ico svg { width: 28px; height: 28px; }
  .scanner-hero h2 {
    font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.02em;
  }
  .scanner-hero p {
    color: var(--muted); margin: 0 auto; max-width: 540px; font-size: 14px;
  }

  .seg-tabs {
    display: flex; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px; padding: 4px;
    margin-bottom: 16px; gap: 2px; overflow-x: auto;
  }
  .seg-tabs button {
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    color: var(--muted); background: transparent; border: none; cursor: pointer;
    border-radius: 7px; white-space: nowrap;
  }
  .seg-tabs button:hover { color: var(--ink); }
  .seg-tabs button.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }

  .input-row {
    display: flex; gap: 10px; margin-bottom: 18px;
  }
  .input {
    flex: 1; padding: 12px 16px; font-size: 14px; font-family: var(--mono);
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    color: var(--ink); outline: none; transition: all 120ms;
  }
  .input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(46,91,255,0.1); }

  .sample-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .sample-card h4 {
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin: 0 0 10px;
  }
  .sample-list { display: flex; flex-direction: column; gap: 6px; }
  .sample-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px; cursor: pointer;
    transition: all 120ms;
  }
  .sample-item:hover {
    border-color: var(--accent); background: #F5F8FF;
    transform: translateY(-1px); box-shadow: var(--shadow-md);
  }
  .sample-item .l { display: flex; flex-direction: column; gap: 2px; }
  .sample-item .doc { font-family: var(--mono); font-size: 13px; color: var(--ink); font-weight: 500; }
  .sample-item .nm { font-size: 12px; color: var(--muted); }
  .sample-item .arr { color: var(--accent); }

  .dropzone {
    border: 2px dashed var(--borderHi); border-radius: 14px;
    padding: 56px 24px; text-align: center; background: var(--surface2);
    cursor: pointer; transition: all 120ms;
  }
  .dropzone:hover, .dropzone.over {
    border-color: var(--accent); background: #F5F8FF;
  }
  .dropzone svg { width: 36px; height: 36px; color: var(--accent); margin-bottom: 14px; }
  .dropzone .t { font-size: 15px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }
  .dropzone .s { font-size: 12px; color: var(--muted); }

  /* ========== BREADCRUMB ========== */
  .breadcrumb {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    font-size: 13px; color: var(--muted);
  }
  .breadcrumb .sep { color: var(--faint); }

  /* ========== ENTITY HEAD ========== */
  .entity-head {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin-bottom: 16px;
    display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;
  }
  .entity-avatar {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, #2E5BFF, #6B47DC);
    color: white; display: grid; place-items: center;
    font-size: 22px; font-weight: 600;
    flex-shrink: 0;
  }
  .entity-info { flex: 1; min-width: 240px; }
  .entity-info h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.02em; }
  .entity-info .meta { color: var(--muted); font-size: 13px; }
  .entity-stats {
    display: flex; gap: 24px; padding-left: 24px; border-left: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .estat .lbl { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .estat .val { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }

  /* ========== CAR DETAIL ========== */
  .car-head-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin-bottom: 16px;
  }
  .car-head-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 16px; flex-wrap: wrap; margin-bottom: 18px;
  }
  .car-head-top h1 {
    font-family: var(--mono); font-size: 14px; font-weight: 500;
    color: var(--ink2); margin: 0 0 6px; word-break: break-all;
  }
  .car-head-top .sub { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 4px; }
  .car-head-top .meta { font-size: 13px; color: var(--muted); }
  .car-head-top .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .car-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px;
    background: var(--border); border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .car-cell-m {
    background: var(--surface); padding: 14px 18px;
  }
  .car-cell-m .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-weight: 500; }
  .car-cell-m .v { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .car-cell-m .v.sm { font-size: 14px; }
  .car-cell-m .s { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .audit-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px;
  }
  .audit-cmn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; position: relative;
  }
  .audit-cmn.ok { border-color: rgba(14,164,113,0.25); background: linear-gradient(180deg, #F4FBF7 0%, var(--surface) 60%); }
  .audit-cmn.bad { border-color: rgba(214,58,58,0.25); background: linear-gradient(180deg, #FEF6F6 0%, var(--surface) 60%); }
  .audit-cmn .cmn-code { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .audit-cmn .cmn-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.01em; }
  .audit-cmn .cmn-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }

  .subtab-bar {
    display: flex; gap: 4px; padding: 4px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px;
    width: fit-content; max-width: 100%; overflow-x: auto;
  }
  .subtab-bar button {
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    background: transparent; color: var(--muted); border: none; cursor: pointer;
    border-radius: 7px; white-space: nowrap;
  }
  .subtab-bar button:hover { color: var(--ink); }
  .subtab-bar button.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }

  .checkpoint {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 8px;
    display: grid; grid-template-columns: 36px 1fr auto; gap: 14px; align-items: center;
  }
  .check-ico {
    width: 36px; height: 36px; border-radius: 10px;
    display: grid; place-items: center;
  }
  .check-ico.ok { background: var(--greenBg); color: var(--green); }
  .check-ico.bad { background: var(--redBg); color: var(--red); }
  .check-ico svg { width: 18px; height: 18px; }
  .check-body .num { font-family: var(--mono); font-size: 11px; color: var(--faint); margin-bottom: 2px; }
  .check-body .nm { font-size: 14px; font-weight: 500; margin-bottom: 2px; letter-spacing: -0.01em; }
  .check-body .desc { font-size: 12px; color: var(--muted); }

  /* ========== EMPTY ========== */
  .empty {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 72px 32px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .empty-ico {
    width: 80px; height: 80px; border-radius: 20px;
    background: linear-gradient(135deg, #EAF0FF, #DCE6FF);
    color: var(--accent); display: grid; place-items: center;
  }
  .empty-ico svg { width: 36px; height: 36px; }
  .empty h2 { font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .empty p { color: var(--muted); margin: 0; max-width: 460px; line-height: 1.55; }
  .empty-actions { display: flex; gap: 8px; margin-top: 8px; }

  /* ========== MAP TALHOES ========== */
  .talhao-map {
    background: linear-gradient(135deg, #F4F7FB 0%, #EAEEF4 100%);
    border-radius: 12px; overflow: hidden; position: relative; min-height: 280px;
  }

  /* Spark bars */
  .spark-row {
    display: grid; grid-template-columns: 110px 1fr 56px;
    gap: 12px; align-items: center; padding: 8px 0;
    font-size: 12px;
  }
  .spark-row .lbl { color: var(--muted); }
  .spark-row .val { text-align: right; font-weight: 600; font-feature-settings: 'tnum'; }
  .spark-bar { height: 6px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
  .spark-bar > span { display: block; height: 100%; border-radius: 999px; }

  /* Risk pill */
  .risk-pill {
    display: inline-flex; align-items: center; gap: 6px; padding: 2px 9px;
    border-radius: 999px; font-size: 11px; font-weight: 600; font-feature-settings: 'tnum';
  }
  .risk-pill.lo { background: var(--greenBg); color: var(--green); }
  .risk-pill.md { background: var(--amberBg); color: var(--amber); }
  .risk-pill.hi { background: var(--redBg); color: var(--red); }

  /* alerts */
  .alert-card {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--red); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .alert-card.warn { border-left-color: var(--amber); }
  .alert-card.info { border-left-color: var(--violet); }
  .alert-card .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .alert-card .head .nm { font-weight: 500; font-size: 13px; }
  .alert-card .sub { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  /* footer */
  .footer {
    padding: 12px 24px; border-top: 1px solid var(--border);
    background: var(--surface); display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted);
  }

  /* utilities */
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .mt-16 { margin-top: 16px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-22 { margin-bottom: 22px; }

  @media (max-width: 1100px) {
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
    .car-grid { grid-template-columns: repeat(3, 1fr); }
    .audit-grid { grid-template-columns: 1fr; }
  }
</style>

  int: (n) => n.toLocaleString(state.lang === 'en' ? 'en-US' : 'pt-BR'),

  pct: (n) => (typeof n === 'number' ? n.toFixed(1) : n) + '%',
};

// avatar color from string
function avColor(s) {
  const palette = ['#2E5BFF','#6B47DC','#0EA471','#C77400','#0D7FBF','#D63A3A'];
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return palette[h % palette.length];
}
function initials(s) {
  return s.split(/\s+/).filter(Boolean).slice(0, 2).map(p => p[0]).join('').toUpperCase();
}

  $$('.side-item').forEach(b => b.classList.toggle('active', b.dataset.mod === state.module));

  $('#t-monitor').textContent = T().monitor;

}

function renderSparkBars() {
  const data = [12, 9, 22, 31, 18, 26, 41, 33, 28, 47, 39, 52];
  const max = Math.max(...data);
  const w = 320, h = 60;
  const bw = w / data.length - 4;
  const bars = data.map((v, i) =>
    `<rect x="${i * (bw + 4)}" y="${h - (v/max) * h}" width="${bw}" height="${(v/max) * h}" fill="#2E5BFF" rx="2" opacity="${0.4 + (v/max) * 0.6}"/>`
  ).join('');
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${bars}</svg>`;
}

// ===========================================================================
// HANDLERS
// ===========================================================================
function attachHandlers() {
  $$('.side-item').forEach(b => b.addEventListener('click', () => {
    state.module = b.dataset.mod;
    state.scannerView = 'input';
    render();
  }));
  $$('[data-mod-go]').forEach(b => b.addEventListener('click', () => {
    state.module = b.dataset.modGo;
    render();
  }));
  $$('[data-hex], [data-region]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.hex || el.dataset.region;
    state.filterRegion = state.filterRegion === id ? 'all' : id;
    state.page = 1;
    render();
  }));
  $$('[data-region-chip]').forEach(el => el.addEventListener('click', () => {
    state.filterRegion = el.dataset.regionChip;
    state.page = 1;
    render();
  }));
  $$('[data-status]').forEach(el => el.addEventListener('click', () => {
    state.filterStatus = el.dataset.status;
    state.page = 1;
    render();
  }));
  const pgPrev = $('#pg-prev'); if (pgPrev) pgPrev.addEventListener('click', () => { if (state.page > 1) { state.page--; render(); } });
  const pgNext = $('#pg-next'); if (pgNext) pgNext.addEventListener('click', () => { state.page++; render(); });

  $$('tr[data-car]').forEach(tr => tr.addEventListener('click', () => {
    state.scannerCar = tr.dataset.car;
    state.lastConsultedCar = tr.dataset.car;
    state.scannerView = 'car';
    state.module = 'scanner';
    state.carSubtab = 'audit';
    render();
  }));
  $$('[data-tab]').forEach(b => b.addEventListener('click', () => {
    state.scannerTab = b.dataset.tab;
    state.scannerInput = '';
    render();
  }));
  $$('[data-fill]').forEach(el => el.addEventListener('click', () => {
    state.scannerInput = el.dataset.fill;
    const inp = $('#scan-input');
    if (inp) inp.value = el.dataset.fill;
  }));
  $$('[data-go-entity]').forEach(el => el.addEventListener('click', () => {
    const cnpj = el.dataset.goEntity;
    state.scannerLoading = true; render();
    setTimeout(() => {
      state.scannerEntity = ENTITY_DETAIL[cnpj];
      state.scannerView = 'entity';
      state.scannerLoading = false; render();
    }, 500);
  }));
  $$('[data-go-car]').forEach(el => el.addEventListener('click', () => {
    const car = el.dataset.goCar;
    state.scannerLoading = true; render();
    setTimeout(() => {
      state.scannerCar = car;
      state.lastConsultedCar = car;
      state.scannerView = 'car';
      state.carSubtab = 'audit';
      state.scannerLoading = false; render();
    }, 500);
  }));
  const inp = $('#scan-input');
  if (inp) inp.addEventListener('input', e => state.scannerInput = e.target.value);
  const goBtn = $('#scan-go');
  if (goBtn) goBtn.addEventListener('click', () => {
    state.scannerLoading = true; render();
    setTimeout(() => {
      state.scannerLoading = false;
      if (state.scannerTab === 'CAR') {
        const c = state.scannerInput.trim();
        state.scannerCar = CAR_DETAIL[c] ? c : 'MT-5108402-B4F12C2614C7794E50A4B8D331EE7702';
        state.lastConsultedCar = state.scannerCar;
        state.scannerView = 'car';
        state.carSubtab = 'audit';
      } else if (state.scannerTab === 'CNPJ' || state.scannerTab === 'CPF') {
        state.scannerEntity = ENTITY_DETAIL['12.345.678/0001-90'];
        state.scannerView = 'entity';
      }
      render();
    }, 600);
  });
  const dz = $('#dz');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('over'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); });
  }
  $$('[data-back-scanner]').forEach(a => a.addEventListener('click', () => {
    state.scannerView = 'input';
    state.scannerEntity = null;
    state.scannerCar = null;
    render();
  }));
  $$('[data-sub]').forEach(b => b.addEventListener('click', () => {
    state.carSubtab = b.dataset.sub;
    render();
  }));
  $$('[data-monitor]').forEach(b => b.addEventListener('click', () => {
    state.monitorTab = b.dataset.monitor;
    render();
  }));
  $$('#lang button').forEach(b => b.addEventListener('click', () => {
    state.lang = b.dataset.l;
    render();
  }));
}

render();
</script>
</body>
</html>
