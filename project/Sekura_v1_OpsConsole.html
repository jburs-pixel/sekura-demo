<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sekura — Monitoreo geoespacial de garantías rurales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0F14;
    --panel: #11161D;
    --panelHi: #161D26;
    --panel2: #0E141B;
    --line: #1E2630;
    --lineHi: #2A3340;
    --text: #D8E0EA;
    --textDim: #7A8694;
    --textFaint: #4A5462;
    --cyan: #3DD9D6;
    --cyanDim: #1F8B8A;
    --amber: #E8A93C;
    --red: #E5484D;
    --green: #3DD978;
    --violet: #9B7EE8;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    overflow: hidden;
  }

  /* ===== APP SHELL ===== */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .topbar {
    height: 44px; display: flex; align-items: center; gap: 16px;
    padding: 0 12px; background: var(--panel);
    border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 11px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px; height: 100%;
    padding-right: 16px; border-right: 1px solid var(--line);
  }
  .brand-mark {
    width: 22px; height: 22px; background: var(--cyan); color: var(--bg);
    display: grid; place-items: center; font-weight: 700; border-radius: 3px;
    font-family: var(--mono); font-size: 12px;
  }
  .brand-name { font-family: var(--sans); font-size: 14px; font-weight: 600; letter-spacing: 0.04em; }
  .brand-ver { color: var(--textFaint); font-size: 10px; letter-spacing: 0.1em; }
  .topnav { display: flex; height: 100%; }
  .topnav button {
    background: none; border: none; color: var(--textDim);
    padding: 0 14px; height: 100%; cursor: pointer;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    border-bottom: 2px solid transparent;
  }
  .topnav button:hover { color: var(--text); }
  .topnav button.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .topbar .right { margin-left: auto; display: flex; align-items: center; gap: 12px; color: var(--textDim); }
  .pulse {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(61,217,120,0.5); }
    70% { box-shadow: 0 0 0 6px rgba(61,217,120,0); }
    100% { box-shadow: 0 0 0 0 rgba(61,217,120,0); }
  }
  .lang { display: flex; border: 1px solid var(--line); }
  .lang button {
    padding: 3px 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    background: transparent; color: var(--textDim); border: none; cursor: pointer; text-transform: uppercase;
  }
  .lang button.active { background: var(--cyan); color: var(--bg); }
  .user-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; }

  /* ===== BODY LAYOUT ===== */
  .body { flex: 1; display: flex; min-height: 0; }
  .sidebar {
    width: 56px; background: var(--panel); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 6px;
  }
  .side-btn {
    width: 40px; height: 40px; background: none; border: 1px solid transparent; cursor: pointer;
    color: var(--textDim); border-radius: 4px; display: grid; place-items: center;
    transition: all 0.15s;
  }
  .side-btn:hover { color: var(--text); background: var(--panelHi); }
  .side-btn.active { color: var(--cyan); border-color: var(--cyan); background: var(--panelHi); }
  .side-btn svg { width: 18px; height: 18px; stroke-width: 1.5; }
  .side-spacer { flex: 1; }
  .side-label {
    font-family: var(--mono); font-size: 8px; letter-spacing: 0.14em; color: var(--textFaint);
    text-transform: uppercase; writing-mode: vertical-rl; transform: rotate(180deg); margin: 8px 0;
  }

  .main { flex: 1; min-width: 0; overflow: auto; display: flex; flex-direction: column; }

  /* ===== PANEL HEADERS ===== */
  .panel-head {
    height: 36px; padding: 0 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--line); background: var(--panel);
    font-family: var(--mono); font-size: 11px; color: var(--textDim); letter-spacing: 0.08em;
    flex-shrink: 0;
  }
  .panel-head .tok { color: var(--cyan); }
  .panel-head .right { margin-left: auto; display: flex; gap: 12px; align-items: center; color: var(--textFaint); }

  /* ===== METRICS ===== */
  .metrics {
    display: grid; grid-template-columns: repeat(6, 1fr); border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .metric { padding: 14px 16px; border-right: 1px solid var(--line); }
  .metric:last-child { border-right: none; }
  .metric .lbl {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--textFaint); margin-bottom: 6px;
  }
  .metric .val { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--text); }
  .metric .val.cyan { color: var(--cyan); }
  .metric .val.amber { color: var(--amber); }
  .metric .val.red { color: var(--red); }
  .metric .val.green { color: var(--green); }
  .metric .sub { font-family: var(--mono); font-size: 10px; color: var(--textDim); margin-top: 4px; }

  /* ===== ACTION BAR ===== */
  .action-bar {
    display: flex; align-items: center; gap: 8px; padding: 12px 16px;
    border-bottom: 1px solid var(--line); background: var(--panel); flex-wrap: wrap; flex-shrink: 0;
  }
  .btn {
    background: var(--cyan); color: var(--bg); border: none; padding: 7px 14px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: #4FE5E2; }
  .btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); font-weight: 400; }
  .btn.ghost:hover { border-color: var(--cyan); color: var(--cyan); }
  .btn.blue { background: #4A90E2; color: var(--bg); }
  .btn svg { width: 12px; height: 12px; stroke-width: 2; }

  /* ===== FILTER CHIPS ===== */
  .filter-bar {
    display: flex; gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--line);
    background: var(--panel); align-items: center; flex-wrap: wrap; flex-shrink: 0;
  }
  .filter-bar .lbl-mono {
    font-family: var(--mono); font-size: 10px; color: var(--textFaint); letter-spacing: 0.14em;
    text-transform: uppercase; margin-right: 4px;
  }
  .chip {
    padding: 4px 10px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
    text-transform: uppercase; background: transparent; color: var(--textDim);
    border: 1px solid var(--line); cursor: pointer;
  }
  .chip:hover { color: var(--text); border-color: var(--lineHi); }
  .chip.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
  .chip .ct { opacity: 0.6; margin-left: 4px; }
  .filter-sep { width: 1px; height: 18px; background: var(--line); margin: 0 6px; }

  /* ===== TABLES ===== */
  table.t { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11px; }
  table.t th {
    text-align: left; padding: 8px 12px; font-size: 9px; letter-spacing: 0.12em;
    color: var(--textFaint); text-transform: uppercase; font-weight: 500;
    background: var(--panel); border-bottom: 1px solid var(--line);
    position: sticky; top: 0;
  }
  table.t td {
    padding: 9px 12px; border-bottom: 1px solid var(--line); color: var(--text);
  }
  table.t tr.click { cursor: pointer; }
  table.t tr.click:hover td { background: var(--panelHi); }
  table.t .dim { color: var(--textDim); }
  table.t .faint { color: var(--textFaint); }
  table.t .cyan { color: var(--cyan); }
  .right-align { text-align: right; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    border: 1px solid; border-radius: 0;
  }
  .badge.ok { color: var(--green); border-color: rgba(61,217,120,0.4); background: rgba(61,217,120,0.08); }
  .badge.watch { color: var(--amber); border-color: rgba(232,169,60,0.4); background: rgba(232,169,60,0.08); }
  .badge.breach { color: var(--red); border-color: rgba(229,72,77,0.4); background: rgba(229,72,77,0.08); }
  .badge.cyan { color: var(--cyan); border-color: rgba(61,217,214,0.4); background: rgba(61,217,214,0.08); }
  .badge.violet { color: var(--violet); border-color: rgba(155,126,232,0.4); background: rgba(155,126,232,0.08); }

  .risk-bar {
    display: inline-block; width: 32px; height: 4px; background: var(--line);
    margin-right: 6px; vertical-align: middle; position: relative;
  }
  .risk-bar > span {
    position: absolute; left: 0; top: 0; height: 100%;
  }

  /* ===== TWO COL ===== */
  .two-col { display: grid; grid-template-columns: 1.4fr 1fr; border-bottom: 1px solid var(--line); }
  .two-col > div:first-child { border-right: 1px solid var(--line); }

  /* ===== HEX MAP ===== */
  .hex-wrap { padding: 16px; display: grid; grid-template-columns: 1fr 200px; gap: 16px; }
  .hex-list-h {
    font-family: var(--mono); font-size: 9px; color: var(--textFaint);
    letter-spacing: 0.14em; margin-bottom: 8px; text-transform: uppercase;
  }
  .hex-row {
    padding: 6px 8px; font-family: var(--mono); font-size: 11px; cursor: pointer;
    display: flex; justify-content: space-between; color: var(--text);
    border-left: 2px solid transparent;
  }
  .hex-row:hover { background: var(--panelHi); }
  .hex-row.active { color: var(--cyan); border-left-color: var(--cyan); background: var(--panelHi); }
  .hex-row .dim { color: var(--textDim); }

  /* ===== DETECTION CHART ===== */
  .det-wrap { padding: 16px; }
  .det-row {
    display: grid; grid-template-columns: 110px 1fr 60px; gap: 8px;
    align-items: center; font-family: var(--mono); font-size: 11px; padding: 4px 0;
  }
  .det-row .dim { color: var(--textDim); }
  .det-bar { height: 6px; background: var(--line); position: relative; }
  .det-bar > span { position: absolute; left: 0; top: 0; height: 100%; }

  /* ===== EMPTY STATE ===== */
  .empty {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px; text-align: center; color: var(--textDim);
  }
  .empty .ico {
    width: 80px; height: 80px; border: 2px solid var(--cyan); border-radius: 50%;
    display: grid; place-items: center; margin-bottom: 24px; color: var(--cyan);
    box-shadow: 0 0 40px rgba(61,217,214,0.2);
  }
  .empty .ico svg { width: 36px; height: 36px; }
  .empty h2 { font-family: var(--sans); font-size: 18px; font-weight: 600; color: var(--text); margin: 0 0 8px; }
  .empty p { font-family: var(--mono); font-size: 11px; max-width: 460px; line-height: 1.6; margin: 0 0 24px; }
  .empty-links { display: flex; gap: 8px; }

  /* ===== SCANNER ===== */
  .scanner-hero {
    padding: 32px 32px 0; display: flex; flex-direction: column; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--line); background: linear-gradient(180deg, var(--panel) 0%, var(--bg) 100%);
  }
  .scanner-ico {
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--cyan), var(--cyanDim));
    display: grid; place-items: center; color: var(--bg);
    box-shadow: 0 0 50px rgba(61,217,214,0.3);
  }
  .scanner-ico svg { width: 28px; height: 28px; stroke-width: 2; }
  .scanner-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .scanner-sub { font-family: var(--mono); font-size: 11px; color: var(--textDim); text-align: center; max-width: 540px; line-height: 1.5; padding-bottom: 16px; }
  .scanner-tabs { display: flex; gap: 0; padding: 0 32px; border-bottom: 1px solid var(--line); background: var(--panel); flex-shrink: 0; }
  .scanner-tabs button {
    background: none; border: none; color: var(--textDim); padding: 12px 18px; cursor: pointer;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    border-bottom: 2px solid transparent;
  }
  .scanner-tabs button:hover { color: var(--text); }
  .scanner-tabs button.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  .scanner-body { padding: 32px; max-width: 880px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
  .input-mono {
    flex: 1; background: var(--panel); border: 1px solid var(--line); color: var(--text);
    padding: 10px 14px; font-family: var(--mono); font-size: 13px; outline: none;
    transition: border 0.15s;
  }
  .input-mono:focus { border-color: var(--cyan); }
  .sample-block {
    border: 1px solid rgba(61,217,214,0.3); background: rgba(61,217,214,0.05);
    padding: 14px 16px;
  }
  .sample-block h4 {
    font-family: var(--mono); font-size: 10px; color: var(--cyan); letter-spacing: 0.14em;
    text-transform: uppercase; margin: 0 0 10px;
  }
  .sample-list { display: flex; flex-direction: column; gap: 6px; }
  .sample-item {
    background: var(--panel); padding: 8px 12px; cursor: pointer; font-family: var(--mono);
    font-size: 11px; color: var(--text); border: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .sample-item:hover { border-color: var(--cyan); background: var(--panelHi); }
  .sample-item .dim { color: var(--textDim); font-size: 10px; }

  .dropzone {
    border: 1.5px dashed var(--lineHi); padding: 48px 24px; text-align: center;
    background: var(--panel); transition: all 0.15s; cursor: pointer;
  }
  .dropzone:hover, .dropzone.over { border-color: var(--cyan); background: var(--panelHi); }
  .dropzone svg { width: 32px; height: 32px; color: var(--cyan); margin-bottom: 14px; }
  .dropzone .t { font-size: 14px; margin-bottom: 6px; }
  .dropzone .s { font-family: var(--mono); font-size: 10px; color: var(--textDim); letter-spacing: 0.06em; }

  /* ===== CNPJ RESULT ===== */
  .breadcrumb {
    font-family: var(--mono); font-size: 10px; color: var(--textDim); letter-spacing: 0.08em;
    padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--panel);
    display: flex; align-items: center; gap: 8px;
  }
  .breadcrumb a { color: var(--cyan); text-decoration: none; cursor: pointer; }
  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb .sep { color: var(--textFaint); }

  .entity-head { padding: 24px 24px 16px; border-bottom: 1px solid var(--line); }
  .entity-head h1 { font-size: 24px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
  .entity-head .meta { font-family: var(--mono); font-size: 11px; color: var(--textDim); }

  .entity-metrics {
    display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--line);
  }

  .conn-card { padding: 16px; border-bottom: 1px solid var(--line); }
  .conn-card h3 { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--textFaint); margin: 0 0 12px; }

  /* ===== CAR DETAIL ===== */
  .car-head {
    display: flex; align-items: center; justify-content: space-between; padding: 16px 24px;
    border-bottom: 1px solid var(--line); gap: 16px; flex-wrap: wrap;
  }
  .car-head .left h1 { font-family: var(--mono); font-size: 14px; margin: 0 0 4px; color: var(--cyan); }
  .car-head .left .sub { font-size: 13px; color: var(--text); margin-bottom: 4px; }
  .car-head .left .sicar { font-family: var(--mono); font-size: 10px; color: var(--cyan); cursor: pointer; }
  .car-head .left .sicar:hover { text-decoration: underline; }
  .car-head .actions { display: flex; gap: 8px; }

  .car-metrics {
    display: grid; grid-template-columns: repeat(6, 1fr); border-bottom: 1px solid var(--line);
  }
  .car-metric { padding: 14px 16px; border-right: 1px solid var(--line); }
  .car-metric:last-child { border-right: none; }
  .car-metric .lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--textFaint); margin-bottom: 6px; }
  .car-metric .val { font-family: var(--mono); font-size: 16px; font-weight: 500; color: var(--text); }
  .car-metric .sub { font-family: var(--mono); font-size: 10px; color: var(--textDim); margin-top: 3px; }

  .audit-strip {
    display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--line);
  }
  .audit-card { padding: 16px; border-right: 1px solid var(--line); }
  .audit-card:last-child { border-right: none; }
  .audit-card .code { font-family: var(--mono); font-size: 10px; color: var(--textFaint); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
  .audit-card .name { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .audit-card .desc { font-size: 11px; color: var(--textDim); margin-bottom: 12px; line-height: 1.5; }

  .subtabs { display: flex; padding: 0 16px; border-bottom: 1px solid var(--line); background: var(--panel); flex-shrink: 0; }
  .subtabs button {
    background: none; border: none; color: var(--textDim); padding: 12px 16px; cursor: pointer;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    border-bottom: 2px solid transparent;
  }
  .subtabs button:hover { color: var(--text); }
  .subtabs button.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  .checkpoint-list { padding: 0; }
  .checkpoint {
    display: grid; grid-template-columns: 32px 32px 1fr auto; gap: 16px;
    padding: 16px 24px; border-bottom: 1px solid var(--line); align-items: center;
  }
  .checkpoint .num { font-family: var(--mono); font-size: 11px; color: var(--textFaint); letter-spacing: 0.1em; }
  .checkpoint .ico {
    width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center;
  }
  .checkpoint .ico.ok { background: rgba(61,217,120,0.15); color: var(--green); }
  .checkpoint .ico.bad { background: rgba(229,72,77,0.15); color: var(--red); }
  .checkpoint .ico svg { width: 14px; height: 14px; stroke-width: 2.5; }
  .checkpoint .body .t { font-size: 13px; font-weight: 600; margin-bottom: 3px; letter-spacing: 0.04em; text-transform: uppercase; }
  .checkpoint .body .s { font-family: var(--mono); font-size: 11px; color: var(--textDim); }

  /* ===== MAP / TALHOES ===== */
  .talhoes-map {
    background: #06090C; border: 1px solid var(--line); position: relative;
  }
  .alert-card {
    padding: 14px 16px; background: rgba(229,72,77,0.06); border: 1px solid rgba(229,72,77,0.3);
    margin-bottom: 12px;
  }
  .alert-card .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .alert-card .title { font-size: 13px; font-weight: 600; color: var(--red); }
  .alert-card .sub { font-family: var(--mono); font-size: 11px; color: var(--textDim); }

  /* ===== PAGINATION ===== */
  .pagination {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; border-top: 1px solid var(--line); background: var(--panel);
    font-family: var(--mono); font-size: 11px; color: var(--textDim);
  }
  .pagination .controls { display: flex; gap: 6px; }
  .pagination button {
    background: transparent; border: 1px solid var(--line); color: var(--text);
    padding: 4px 12px; font-family: var(--mono); font-size: 11px; cursor: pointer;
  }
  .pagination button:hover:not(:disabled) { border-color: var(--cyan); color: var(--cyan); }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== FOOTER ===== */
  .footer {
    padding: 8px 16px; border-top: 1px solid var(--line); background: var(--panel);
    font-family: var(--mono); font-size: 10px; color: var(--textFaint);
    letter-spacing: 0.1em; text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer .l { display: flex; gap: 12px; align-items: center; }
  .footer .l span { color: var(--textDim); }

  /* sub-tab content padding */
  .pad { padding: 20px; }
  .grid-2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
  .panel-card {
    background: var(--panel); border: 1px solid var(--line); padding: 14px;
  }
  .panel-card h3 {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--textFaint); margin: 0 0 10px;
  }

  /* monitor mini-grid */
  .monitor-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; border-bottom: 1px solid var(--line); }
  .crop-row {
    display: flex; align-items: center; justify-content: space-between; padding: 10px 12px;

function renderHexMap() {
  // simple hex grid representing Brazil regions
  const hexes = [
    { id: 'north', q: 0, r: 0 }, { id: 'north', q: 1, r: 0 }, { id: 'north', q: 2, r: 0 }, { id: 'north', q: 0, r: 1 }, { id: 'north', q: 1, r: 1 },
    { id: 'northeast', q: 3, r: 0 }, { id: 'northeast', q: 4, r: 0 }, { id: 'northeast', q: 3, r: 1 }, { id: 'northeast', q: 4, r: 1 }, { id: 'northeast', q: 3, r: 2 },
    { id: 'midwest', q: 1, r: 2 }, { id: 'midwest', q: 2, r: 2 }, { id: 'midwest', q: 1, r: 3 }, { id: 'midwest', q: 2, r: 3 },
    { id: 'southeast', q: 3, r: 3 }, { id: 'southeast', q: 2, r: 4 }, { id: 'southeast', q: 3, r: 4 },
    { id: 'south', q: 2, r: 5 }, { id: 'south', q: 1, r: 5 },
  ];
  const size = 26;
  const w = Math.sqrt(3) * size;
  const h2 = 2 * size * 0.75;
  const colorFor = (id) => {
    const r = REGIONS.find(x => x.id === id);
    const intensity = r.pct / 30;
    return state.filterRegion === id ? 'var(--cyan)' : `rgba(61,217,214,${0.1 + intensity * 0.6})`;
  };
  const polys = hexes.map((hex, i) => {
    const cx = 30 + hex.q * w + (hex.r % 2) * (w / 2);
    const cy = 30 + hex.r * h2;
    const pts = [0,1,2,3,4,5].map(k => {
      const a = (Math.PI/3)*k - Math.PI/2;
      return `${cx + size*Math.cos(a)},${cy + size*Math.sin(a)}`;
    }).join(' ');
    return `<polygon points="${pts}" fill="${colorFor(hex.id)}" stroke="var(--lineHi)" stroke-width="1" data-hex="${hex.id}" style="cursor:pointer"/>`;
  }).join('');
  // labels per region cluster
  const labels = REGIONS.map(r => {
    const cluster = hexes.filter(h => h.id === r.id);
    const avgQ = cluster.reduce((s, h) => s + h.q, 0) / cluster.length;
    const avgR = cluster.reduce((s, h) => s + h.r, 0) / cluster.length;
    const cx = 30 + avgQ * w + (Math.round(avgR) % 2) * (w / 2);
    const cy = 30 + avgR * h2;
    return `<g pointer-events="none">
      <text x="${cx}" y="${cy - 1}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="#0B0F14" font-weight="700" letter-spacing="0.08em">${r[state.lang].toUpperCase()}</text>
      <text x="${cx}" y="${cy + 9}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="#0B0F14" font-weight="700">${fmt.pct(r.pct)}</text>
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 320 280" style="width:100%;display:block;">${polys}${labels}</svg>`;
}

function renderSparkBars() {
  const data = [12, 9, 22, 31, 18, 26, 41, 33, 28, 47, 39, 52];
  const max = Math.max(...data);
  const w = 320, h = 70;
  const bw = w / data.length - 2;
  const bars = data.map((v, i) =>
    `<rect x="${i * (bw + 2)}" y="${h - (v/max) * h}" width="${bw}" height="${(v/max) * h}" fill="var(--cyan)" opacity="${0.3 + (v/max) * 0.7}"/>`
  ).join('');
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${bars}</svg>`;
}

            ${c.ok
              ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
              : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'}
          </div>
          <div class="body">
            <div class="t">${c.name}</div>
            <div class="s">${c.desc}</div>
          </div>
          <span class="badge cyan">${c.mcr}</span>
        </div>
      `).join('')}
    </div>`;
  }
  if (state.carSubtab === 'geoms') {
    return `<div class="pad">
      <div class="panel-card" style="margin-bottom:16px">
        <h3>${T.cropArea}</h3>
        <table class="t">
          <thead><tr><th>${T.cropArea}</th><th class="right-align">${T.pct}</th><th class="right-align">${state.lang === 'en' ? 'Hectares' : 'Hectares'}</th></tr></thead>
          <tbody>
            ${d.geometries.map(g => `
              <tr><td>${g.tipo}</td><td class="right-align">${fmt.pct(g.pct)}</td><td class="right-align">${g.ha.toFixed(2).replace('.', ',')} ha</td></tr>
            `).join('')}
            <tr><td><strong>${T.total}</strong></td><td class="right-align"><strong>100%</strong></td><td class="right-align"><strong>${fmt.int(d.ha)} ha</strong></td></tr>
          </tbody>
        </table>
        <div style="margin-top:12px"><a style="color:var(--cyan);font-family:var(--mono);font-size:11px;cursor:pointer">↓ ${T.download}</a></div>
      </div>
      <div class="panel-card">
        <h3>${T.geoms.toUpperCase()}</h3>
        ${renderTalhoesMap(d)}
      </div>
    </div>`;
  }
  if (state.carSubtab === 'overlap') {
    return `<div class="pad">
      <div class="panel-card">
        <h3>${T.overlap}</h3>
        ${d.overlaps.length === 0
          ? `<div style="font-family:var(--mono);font-size:11px;color:var(--textFaint);padding:20px 0;font-style:italic;">${state.lang === 'en' ? 'No overlaps detected.' : (state.lang === 'es' ? 'Sin solapamientos detectados.' : 'Sem sobreposições detectadas.')}</div>`
          : `<table class="t">
              <thead><tr><th>${T.car}</th><th>${T.muni}</th><th class="right-align">${T.area} (ha)</th><th class="right-align">${T.pct}</th><th>${T.statusV}</th></tr></thead>
              <tbody>
                ${d.overlaps.map(o => `
                  <tr>
                    <td class="cyan" style="font-size:10px">${o.car.slice(0, 32)}…</td>
                    <td class="dim">${o.muni}</td>
                    <td class="right-align">${o.ha} ha</td>
                    <td class="right-align">${o.pct}%</td>
                    <td><span class="badge ${o.status}">${o.status === 'breach' ? T.notConf : T.confName}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>`
        }
      </div>
    </div>`;
  }
  if (state.carSubtab === 'monitoring') {
    return `<div>
      <div class="subtabs" style="border-top:0;padding:0 16px;">
        <button data-monitor="current" class="${state.monitorTab === 'current' ? 'active' : ''}">${T.current}</button>
        <button data-monitor="historic" class="${state.monitorTab === 'historic' ? 'active' : ''}">${T.historic}</button>
      </div>
      <div class="pad">
        <div class="grid-2">
          <div>
            <div class="panel-card" style="margin-bottom:16px">
              <h3>${T.summary}</h3>
              ${d.crops.map(c => `
                <div class="crop-row">
                  <span><span class="swatch" style="background:${c.color}"></span>${c.name === 'soja' ? T.soja : T.milho}</span>
                  <span>${c.ha.toFixed(1).replace('.', ',')} ha</span>
                </div>
              `).join('')}
              <div style="margin-top:10px;display:flex;gap:8px;align-items:center;font-family:var(--mono);font-size:11px;">
                <span style="color:var(--textDim)">STATE:</span>
                <span class="badge ${d.monitorAlerts > 0 ? 'breach' : 'ok'}">${d.monitorAlerts > 0 ? T.criticalAlert : T.confName}</span>
              </div>
            </div>
            ${d.alertList.length > 0 ? `
              <div class="panel-card">
                <h3>${T.activeAlerts}</h3>
                ${d.alertList.map(a => `
                  <div class="alert-card">
                    <div class="head">
                      <span class="title">${a.kind === 'embargo' ? T.embargo : (a.kind === 'fire' ? T.fire : (a.kind === 'overlap' ? 'CAR overlap' : T.deforestation))}</span>
                      <span class="badge ${a.sev === 'high' ? 'breach' : (a.sev === 'medium' ? 'watch' : 'violet')}">${a.sev === 'high' ? T.high : (a.sev === 'medium' ? T.med : T.low)}</span>
                    </div>
                    <div class="sub">${a.id} · ${a.date} · ${a.area} ha · ${a.conf}% ${T.confidence} · ${a.sat}</div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
              <div class="panel-card" style="text-align:center;padding:18px;">
                <div class="lbl" style="font-family:var(--mono);font-size:9px;color:var(--textFaint);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px;">${T.activeAlerts}</div>
                <div style="font-family:var(--mono);font-size:32px;font-weight:600;color:${d.monitorAlerts > 0 ? 'var(--red)' : 'var(--green)'};">${d.monitorAlerts}</div>
              </div>
              <div class="panel-card" style="text-align:center;padding:18px;">
                <div class="lbl" style="font-family:var(--mono);font-size:9px;color:var(--textFaint);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px;">${T.vegCover}</div>
                <div style="font-family:var(--mono);font-size:32px;font-weight:600;color:var(--green);">${d.monitorVeg}%</div>
              </div>
            </div>
          </div>
          <div>
            <div class="panel-card">
              <h3>${T.talhoes}</h3>
              ${renderTalhoesMap(d)}
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }
}

function renderTalhoesMap(d) {
  // Two parcels colored by crop
  const parcels = [
    { d: 'M 60 50 Q 120 40 180 60 L 220 90 L 200 160 Q 140 170 80 150 Z', c: d.crops[0]?.color || '#3DD978', label: d.crops[0]?.name === 'soja' ? t().soja : t().milho, ha: d.crops[0]?.ha },
    { d: 'M 220 90 L 320 100 L 340 200 L 240 220 L 200 160 Z', c: d.crops[1]?.color || '#E8A93C', label: d.crops[1] ? (d.crops[1].name === 'soja' ? t().soja : t().milho) : '', ha: d.crops[1]?.ha },
  ];
  return `<div class="talhoes-map">
    <svg viewBox="0 0 400 280" style="width:100%;display:block;">
      <defs>
        <pattern id="tg" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="var(--line)" stroke-width="0.5"/>
        </pattern>
      </defs>
      <rect width="400" height="280" fill="url(#tg)"/>
      ${parcels.filter(p => p.ha).map(p => `
        <path d="${p.d}" fill="${p.c}" fill-opacity="0.35" stroke="${p.c}" stroke-width="1.5"/>
      `).join('')}
      ${d.alertList.filter(a => a.sev === 'high').map((_, i) => `
        <circle cx="${180 + i*30}" cy="${110 + i*20}" r="4" fill="var(--red)">
          <animate attributeName="r" values="4;9;4" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
        </circle>
      `).join('')}
      <text x="100" y="100" font-family="var(--mono)" font-size="10" fill="#0B0F14" font-weight="600">${parcels[0].label} · ${parcels[0].ha?.toFixed(1)}ha</text>
      ${parcels[1].ha ? `<text x="240" y="160" font-family="var(--mono)" font-size="10" fill="#0B0F14" font-weight="600">${parcels[1].label} · ${parcels[1].ha?.toFixed(1)}ha</text>` : ''}
      <text x="20" y="265" font-family="var(--mono)" font-size="9" fill="var(--textDim)">SENTINEL-2 · 10m · 2026-05-02</text>
      <g transform="translate(370, 30)">
        <circle r="14" fill="var(--panel)" stroke="var(--text)" stroke-width="0.8"/>
        <path d="M 0 -10 L 3 0 L 0 10 L -3 0 Z" fill="var(--text)"/>
        <text y="-16" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="var(--text)">N</text>
      </g>
    </svg>
  </div>`;
}

// ===========================================================================
// MODULE 3: MONITORATOKEN
// ===========================================================================
function renderMonitor() {
  const T = t();
  if (state.lastConsultedCar) {
    // If a CAR was consulted recently, show its detail
    return `
      <div class="panel-head"><span class="tok">$</span> MONITORATOKEN · ${state.lastConsultedCar.slice(0, 32)}…</div>
      ${renderCarDetail(state.lastConsultedCar)}
    `;
  }
  return `
    <div class="panel-head"><span class="tok">$</span> MONITORATOKEN</div>
    <div class="empty">
      <div class="ico">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
      </div>
      <h2>${T.monitorEmpty}</h2>
      <p>${T.monitorEmpty2}</p>
      <div class="empty-links">
        <button class="btn ghost" data-mod-go="panel">${T.goPanel}</button>
        <button class="btn" data-mod-go="scanner">${T.goScanner}</button>
      </div>
    </div>
  `;
}

// ===========================================================================
// HANDLERS
// ===========================================================================
function attachHandlers() {
  // module nav
  $$('[data-mod]').forEach(b => b.addEventListener('click', () => {
    state.module = b.dataset.mod;
    state.scannerView = 'input';
    render();
  }));
  $$('[data-mod-go]').forEach(b => b.addEventListener('click', () => {
    state.module = b.dataset.modGo;
    render();
  }));

  // hex / region filters
  $$('[data-hex]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.hex;
    state.filterRegion = state.filterRegion === id ? 'all' : id;
    state.page = 1;
    render();
  }));
  $$('[data-region]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.region;
    state.filterRegion = state.filterRegion === id ? 'all' : id;
    state.page = 1;
    render();
  }));
  $$('[data-region-chip]').forEach(el => el.addEventListener('click', () => {
    state.filterRegion = el.dataset.regionChip;
    state.page = 1;
    render();
  }));
  $$('[data-status]').forEach(el => el.addEventListener('click', () => {
    state.filterStatus = el.dataset.status;
    state.page = 1;
    render();
  }));

  // pagination
  const pgPrev = $('#pg-prev'); if (pgPrev) pgPrev.addEventListener('click', () => { if (state.page > 1) { state.page--; render(); } });
  const pgNext = $('#pg-next'); if (pgNext) pgNext.addEventListener('click', () => { state.page++; render(); });

  // table → CAR detail
  $$('tr[data-car]').forEach(tr => tr.addEventListener('click', () => {
    state.scannerCar = tr.dataset.car;
    state.lastConsultedCar = tr.dataset.car;
    state.scannerView = 'car';
    state.module = 'scanner';
    state.carSubtab = 'audit';
    render();
  }));

  // scanner tabs
  $$('[data-tab]').forEach(b => b.addEventListener('click', () => {
    state.scannerTab = b.dataset.tab;
    state.scannerInput = '';
    render();
  }));

  // sample fill
  $$('[data-fill]').forEach(el => el.addEventListener('click', () => {
    state.scannerInput = el.dataset.fill;
    const inp = $('#scan-input');
    if (inp) inp.value = el.dataset.fill;
  }));

  // sample → entity / car
  $$('[data-go-entity]').forEach(el => el.addEventListener('click', () => {
    const cnpj = el.dataset.goEntity;
    state.scannerLoading = true;
    render();
    setTimeout(() => {
      state.scannerEntity = ENTITY_DETAIL[cnpj];
      state.scannerView = 'entity';
      state.scannerLoading = false;
      render();
    }, 600);
  }));
  $$('[data-go-car]').forEach(el => el.addEventListener('click', () => {
    const car = el.dataset.goCar;
    state.scannerLoading = true;
    render();
    setTimeout(() => {
      state.scannerCar = car;
      state.lastConsultedCar = car;
      state.scannerView = 'car';
      state.carSubtab = 'audit';
      state.scannerLoading = false;
      render();
    }, 500);
  }));

  // input
  const inp = $('#scan-input');
  if (inp) inp.addEventListener('input', e => state.scannerInput = e.target.value);
  const goBtn = $('#scan-go');
  if (goBtn) goBtn.addEventListener('click', () => {
    state.scannerLoading = true;
    render();
    setTimeout(() => {
      state.scannerLoading = false;
      // best-effort routing based on tab
      if (state.scannerTab === 'CAR') {
        const c = state.scannerInput.trim();
        state.scannerCar = CAR_DETAIL[c] ? c : 'MT-5108402-B4F12C2614C7794E50A4B8D331EE7702';
        state.lastConsultedCar = state.scannerCar;
        state.scannerView = 'car';
        state.carSubtab = 'audit';
      } else if (state.scannerTab === 'CNPJ' || state.scannerTab === 'CPF') {
        state.scannerEntity = ENTITY_DETAIL['12.345.678/0001-90'];
        state.scannerView = 'entity';
      }
      render();
    }, 700);
  });

  // dropzone
  const dz = $('#dz');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('over'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); });
    dz.addEventListener('click', () => alert(t().drag));
  }

  // back from entity / car
  $$('[data-back-scanner]').forEach(a => a.addEventListener('click', () => {
    state.scannerView = 'input';
    state.scannerEntity = null;
    state.scannerCar = null;
    render();
  }));

  // CAR sub-tabs
  $$('[data-sub]').forEach(b => b.addEventListener('click', () => {
    state.carSubtab = b.dataset.sub;
    render();
  }));
  $$('[data-monitor]').forEach(b => b.addEventListener('click', () => {
    state.monitorTab = b.dataset.monitor;
    render();
  }));

  // language
  $$('#lang button').forEach(b => b.addEventListener('click', () => {
    state.lang = b.dataset.l;
    render();
  }));
}

// ===========================================================================
// CLOCK
// ===========================================================================
function tickClock() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  const s = `${d.getFullYear()}.${pad(d.getMonth() + 1)}.${pad(d.getDate())} · ${pad(d.getHours())}:${pad(d.getMinutes())} BRT`;
  const el = $('#clock');
  if (el) el.textContent = s;
}
setInterval(tickClock, 30000);
tickClock();

// ===========================================================================
// BOOT
// ===========================================================================
render();

// initial topbar handlers
$$('#topnav button').forEach(b => b.addEventListener('click', () => {
  state.module = b.dataset.mod;
  state.scannerView = 'input';
  render();
}));
$$('#sidebar .side-btn').forEach(b => b.addEventListener('click', () => {
  state.module = b.dataset.mod;
  state.scannerView = 'input';
  render();
}));
$$('#lang button').forEach(b => b.addEventListener('click', () => {
  state.lang = b.dataset.l;
  render();
}));
</script>
</body>
</html>
